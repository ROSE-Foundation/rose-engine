[profile.default]
src = "src"
out = "out"
libs = ["lib"]
# Pin solc for reproducible builds. OZ Contracts 5.6.x require solc >= 0.8.20.
solc = "0.8.28"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
