# Local development services. Story 1.1 declares the PostgreSQL 18 service only; it is
# not started by this story. The ledger schema and double-entry trigger (Stories 1.4/1.5)
# depend on PostgreSQL-specific features — SQLite is NOT used in PROD.
services:
  postgres:
    image: postgres:18
    container_name: rose-engine-postgres
    environment:
      POSTGRES_USER: rose
      POSTGRES_PASSWORD: rose
      POSTGRES_DB: rose_engine
    ports:
      # Host 5544 → container 5432, to avoid colliding with other local Postgres instances
      # on the default 5432. Local DATABASE_URL uses 5544; CI (no conflict) can use 5432.
      - '5544:5432'
    volumes:
      # PostgreSQL 18+ images store data in a major-version subdirectory and require the
      # volume mounted at /var/lib/postgresql (NOT /var/lib/postgresql/data).
      - rose-pgdata:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U rose -d rose_engine']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  rose-pgdata:
